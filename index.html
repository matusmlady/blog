<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/jsvectormap.min.css" />
</head>
<body>

  <div class="glowing menu">
    <a class="menu-item" href="./packing.html">Packing</a>
    <a class="menu-item" href="./tips.html">Tips</a>
    <a class="menu-item" href="./storytime.html">Stories</a>
    <a class="menu-item" href="./cooking.html">Cooking</a>
    <a class="menu-item" href="https://matusmlady.github.io/azivon">Azivon</a>
  </div>

  <div id="world-map"></div>

  <script src="https://cdn.jsdelivr.net/npm/jsvectormap"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>
  <script>
    const visitedCountries = [
      "SK", // Slovakia
      "CZ", // Czechia
      "ES", // Spain
      "MA", // Morocco
      "PT", // Lisbon -> Portugal
      "GB", // Great Britain
      "AT", // Austria
      "PL", // Poland
      "RO", // Romania
      "CH", // Switzerland
      "IT", // Italy
      "NO",  // Norway
    ];

    const menu = document.querySelector("div.glowing.menu");
    const mapElement = document.getElementById("world-map");

    function resizeMapArea(mapInstance) {
      const menuHeight = menu.offsetHeight;
      mapElement.style.height = `calc(100vh - ${menuHeight}px)`;
      mapInstance.updateSize();
    }

    const map = new jsVectorMap({
      selector: "#world-map",
      map: "world",
      backgroundColor: "transparent",

      draggable: true,
      zoomButtons: false,
      zoomOnScroll: true,
      bindTouchEvents: true,
      zoomAnimate: true,
      zoomStep: 1.2,
      zoomMin: 1,
      zoomMax: 12,

      showTooltip: false,
      selectedRegions: visitedCountries,

      focusOn: {
        regions: visitedCountries,
        animate: false
      },

      regionStyle: {
        initial: {
          fill: "#000000",
          stroke: "#000000",
          "stroke-width": 0.12
        },
        hover: {
          fill: "#000000",
          stroke: "#000000",
          "stroke-width": 0.12,
          cursor: "default"
        },
        selected: {
          fill: "#00ffff",
          stroke: "#00ffff",
          "stroke-width": 0.12
        },
        selectedHover: {
          fill: "#66ffff",
          stroke: "#66ffff",
          "stroke-width": 0.12
        }
      },

      onLoaded(mapInstance) {
        resizeMapArea(mapInstance);
        window.addEventListener("resize", () => resizeMapArea(mapInstance));
      }
    });
  </script>

</body>
</html>
